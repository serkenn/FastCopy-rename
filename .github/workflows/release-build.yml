name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        platform: [Win32, x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build (Release/${{ matrix.platform }})
        shell: pwsh
        run: |
          msbuild FastCopy.sln `
            /m `
            /p:Configuration=Release `
            /p:Platform=${{ matrix.platform }} `
            /p:PlatformToolset=v143

      - name: Package binaries
        shell: pwsh
        run: |
          $platform = "${{ matrix.platform }}"
          $outDir = if ($platform -eq "Win32") { "Release" } else { "x64\Release" }
          if (!(Test-Path $outDir)) {
            throw "Build output directory not found: $outDir"
          }

          $zipName = "FastCopy-${platform}-Release.zip"
          if (Test-Path $zipName) { Remove-Item $zipName -Force }
          Compress-Archive -Path "$outDir\*" -DestinationPath $zipName -CompressionLevel Optimal

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FastCopy-${{ matrix.platform }}-Release
          path: FastCopy-${{ matrix.platform }}-Release.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release with assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/FastCopy-Win32-Release/FastCopy-Win32-Release.zip
            artifacts/FastCopy-x64-Release/FastCopy-x64-Release.zip
