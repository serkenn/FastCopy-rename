name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build x64
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build (Release/x64)
        shell: pwsh
        run: |
          msbuild FastCopy.sln `
            /m `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:WindowsTargetPlatformVersion=10.0

      - name: Package binaries
        shell: pwsh
        run: |
          $platform = "x64"
          $outDir = "x64\Release"
          if (!(Test-Path $outDir)) {
            throw "Build output directory not found: $outDir"
          }

          $zipName = "FastCopy-${platform}-Release.zip"
          if (Test-Path $zipName) { Remove-Item $zipName -Force }
          Compress-Archive -Path "$outDir\*" -DestinationPath $zipName -CompressionLevel Optimal

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FastCopy-x64-Release
          path: FastCopy-x64-Release.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release with assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/FastCopy-x64-Release/FastCopy-x64-Release.zip
